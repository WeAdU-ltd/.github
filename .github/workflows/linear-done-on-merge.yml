name: Linear Done on merge

on:
  pull_request:
    types:
      - closed

permissions:
  contents: read

jobs:
  linear-done:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == github.event.repository.default_branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Mark Linear issues Done (branch name + PR title)
        env:
          # Organization secret LINEAR_API_KEY is available when the repo is allowed to use it.
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: python3 scripts/linear_mark_done_on_merge.py
