# Enables GitHub auto-merge on eligible PRs so the default branch merges itself
# once required checks pass (no human merge click). Same intent as NEG org automation.

name: Auto-merge PR

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  enable-auto-merge:
    name: Enable auto-merge
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.base.ref == github.event.repository.default_branch &&
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Enable GitHub auto-merge when checks pass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh pr merge "${{ github.event.pull_request.number }}" --auto --merge \
            || echo "auto-merge: gh pr merge exited non-zero (already enabled, rules, or mergeability); continuing."
