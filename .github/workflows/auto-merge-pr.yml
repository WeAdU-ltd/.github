# Enables GitHub auto-merge on eligible PRs so the default branch merges itself
# once required checks pass (no human merge click). Same intent as NEG org automation.
#
# Other repos: add a workflow that calls WeAdU-ltd/.github/.github/workflows/auto-merge-enable.yml@main
# (see README « Organization-wide auto-merge »).

name: Auto-merge PR

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

concurrency:
  group: auto-merge-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  enable-auto-merge:
    name: Enable auto-merge
    uses: ./.github/workflows/auto-merge-enable.yml
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.base.ref == github.event.repository.default_branch &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
      pull-requests: write
    with:
      pr_number: ${{ github.event.pull_request.number }}
