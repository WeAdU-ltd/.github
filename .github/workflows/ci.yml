name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  actionlint:
    name: Lint workflows
    runs-on: ubuntu-latest
    steps:
      # Full history so gitleaks can scan commits (WEA-32); same job name as before branch protection.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install actionlint
        run: bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)

      - name: Run actionlint
        run: ./actionlint -color

      - name: IBKR API smoke (WEA-30 dry-run)
        run: python3 scripts/ibkr_smoke_wea30.py --dry-run

      - name: Gmail OAuth smoke (WEA-24 dry-run)
        run: python3 scripts/gmail_oauth_smoke_wea24.py --dry-run

      - name: CI failure alert script (syntax)
        run: python3 -m py_compile scripts/github_failure_alert.py

      - name: 1Password resolve script (syntax)
        run: python3 -m py_compile scripts/onepassword_resolve_ref.py

      - name: WEA-36 Linear Repl issues script (syntax)
        run: python3 -m py_compile scripts/linear_create_wea36_repl_issues.py

      - name: Linear issue comment script (syntax)
        run: python3 -m py_compile scripts/linear_issue_comment.py

      - name: AWS GitHub OIDC probe script (syntax)
        run: bash -n scripts/aws_github_oidc_probe.sh

      - name: WEA-35 socle template init script (syntax + dry-run)
        run: |
          set -euo pipefail
          bash -n scripts/init_wea35_socle_template.sh
          bash scripts/init_wea35_socle_template.sh --help >/dev/null
          tmp=$(mktemp -d)
          bash scripts/init_wea35_socle_template.sh "$tmp"
          test -f "$tmp/AGENTS.md"
          test -f "$tmp/.cursor/hooks.json"
          rm -rf "$tmp"

      - name: 1Password SDK (optional import)
        run: |
          set -euo pipefail
          python3 -m pip install -q -r requirements-onepassword.txt
          python3 scripts/onepassword_resolve_ref.py --dry-run

      - name: Cursor secret scan script (syntax)
        run: bash -n scripts/cursor_secret_scan_pre_commit.sh && bash -n .githooks/pre-commit

      - name: Google Ads + Analytics API smoke (WEA-21 dry-run)
        run: python3 scripts/google_ads_analytics_smoke_wea21.py --dry-run

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          set -euo pipefail
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${tarball}" -o "/tmp/${tarball}"
          tar -xzf "/tmp/${tarball}" -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Run gitleaks
        run: gitleaks detect --source . --redact --verbose
