name: Reusable flip-flop deploy

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub environment name for the deployment target.
        required: true
        type: string
      runs_on:
        description: GitHub-hosted runner label for the deploy job.
        required: false
        default: ubuntu-latest
        type: string
      working_directory:
        description: Working directory used for every local shell step.
        required: false
        default: .
        type: string
      deploy_ref:
        description: Optional git ref to deploy instead of the triggering SHA.
        required: false
        default: ""
        type: string
      fetch_depth:
        description: Depth used when checking out repository contents.
        required: false
        default: 1
        type: number
      checkout_submodules:
        description: Whether git submodules should be checked out too.
        required: false
        default: false
        type: boolean
      setup_command:
        description: Optional command that prepares the repository before build.
        required: false
        default: ""
        type: string
      build_command:
        description: Optional command that builds the deployable artifact.
        required: false
        default: ""
        type: string
      ssh_connection:
        description: SSH connection string for the remote server (e.g. user@host).
        required: true
        type: string
      remote_base_dir:
        description: Absolute path on the remote server under which deploys are stored.
        required: true
        type: string
      remote_public_dir:
        description: Absolute path to the symlink that points to the live deployment.
        required: true
        type: string
      repo_public_subdir:
        description: Subdirectory inside the repo that becomes the public root.
        required: false
        default: "."
        type: string
      post_activate_command:
        description: Optional command run on the remote server after the symlink is swapped.
        required: false
        default: ""
        type: string
      keep_releases:
        description: Number of old releases to keep on the remote server.
        required: false
        default: 5
        type: number
      env_file_path:
        description: Where the env_file secret should be written inside the release dir.
        required: false
        default: .env
        type: string
      cancel_in_progress:
        description: Cancel older in-flight deployments for the same environment.
        required: false
        default: true
        type: boolean
      timeout_minutes:
        description: Maximum number of minutes the deploy job may run.
        required: false
        default: 30
        type: number
    secrets:
      env_file:
        description: Optional multiline env file content written to env_file_path.
        required: false
      ssh_private_key:
        description: SSH private key for connecting to the deploy target.
        required: true
      ssh_known_hosts:
        description: known_hosts contents for the deploy target.
        required: true

jobs:
  deploy:
    name: Flip-flop deploy to ${{ inputs.environment }}
    runs-on: ${{ inputs.runs_on }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    environment:
      name: ${{ inputs.environment }}
    concurrency:
      group: flip-flop-deploy-${{ github.repository }}-${{ inputs.environment }}
      cancel-in-progress: ${{ inputs.cancel_in_progress }}
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Check out requested ref
        if: inputs.deploy_ref != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.deploy_ref }}
          fetch-depth: ${{ inputs.fetch_depth }}
          submodules: ${{ inputs.checkout_submodules }}

      - name: Check out triggering ref
        if: inputs.deploy_ref == ''
        uses: actions/checkout@v4
        with:
          fetch-depth: ${{ inputs.fetch_depth }}
          submodules: ${{ inputs.checkout_submodules }}

      - name: Configure SSH credentials
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ssh_private_key }}
          SSH_KNOWN_HOSTS: ${{ secrets.ssh_known_hosts }}

      - name: Materialize environment file
        env:
          ENV_FILE_CONTENT: ${{ secrets.env_file }}
          ENV_FILE_PATH: ${{ inputs.env_file_path }}
        run: |
          if [[ -z "${ENV_FILE_CONTENT:-}" ]]; then
            exit 0
          fi
          mkdir -p "$(dirname "$ENV_FILE_PATH")"
          printf '%s\n' "$ENV_FILE_CONTENT" > "$ENV_FILE_PATH"

      - name: Run setup command
        if: inputs.setup_command != ''
        run: ${{ inputs.setup_command }}

      - name: Run build command
        if: inputs.build_command != ''
        run: ${{ inputs.build_command }}

      - name: Deploy release to remote server
        env:
          SSH_CONNECTION: ${{ inputs.ssh_connection }}
          REMOTE_BASE_DIR: ${{ inputs.remote_base_dir }}
          REMOTE_PUBLIC_DIR: ${{ inputs.remote_public_dir }}
          REPO_PUBLIC_SUBDIR: ${{ inputs.repo_public_subdir }}
          KEEP_RELEASES: ${{ inputs.keep_releases }}
          POST_ACTIVATE_COMMAND: ${{ inputs.post_activate_command }}
        run: |
          set -euo pipefail

          RELEASE_ID="$(date +%s)-${GITHUB_SHA:0:8}"
          RELEASES_DIR="${REMOTE_BASE_DIR}/releases"
          RELEASE_DIR="${RELEASES_DIR}/${RELEASE_ID}"

          ssh "${SSH_CONNECTION}" "mkdir -p '${RELEASE_DIR}'"

          rsync -az --delete ./ "${SSH_CONNECTION}:${RELEASE_DIR}/"

          LINK_TARGET="${RELEASE_DIR}"
          if [[ "${REPO_PUBLIC_SUBDIR}" != "." ]]; then
            LINK_TARGET="${RELEASE_DIR}/${REPO_PUBLIC_SUBDIR}"
          fi
          ssh "${SSH_CONNECTION}" "ln -sfn '${LINK_TARGET}' '${REMOTE_PUBLIC_DIR}'"

          if [[ -n "${POST_ACTIVATE_COMMAND:-}" ]]; then
            ssh "${SSH_CONNECTION}" "cd '${RELEASE_DIR}' && ${POST_ACTIVATE_COMMAND}"
          fi

          if [[ "${KEEP_RELEASES}" -gt 0 ]]; then
            ssh "${SSH_CONNECTION}" "cd '${RELEASES_DIR}' && ls -1d */ 2>/dev/null | sort | head -n -${KEEP_RELEASES} | xargs -r rm -rf"
          fi

          echo "::notice::Deployed release ${RELEASE_ID} → ${REMOTE_PUBLIC_DIR}"

      - name: Remove SSH credentials
        if: always()
        run: rm -f ~/.ssh/id_ed25519 ~/.ssh/known_hosts
